title = "meraki-mx-cold-swap-ai gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Synthetic examples and placeholders"
paths = [
  '''examples/''',
  '''docs/intake.yaml''',
  '''prompts/start-wizard.md''',
  '''CONTRIBUTING.md''',
]
regexes = [
  '''asagatelyan''',
  '''L_000000000000000000''',
  '''Q2XX-AAAA-BBBB''',
  '''Q2YY-CCCC-DDDD''',
  '''Q2XX-XXXX-XXXX''',
]
